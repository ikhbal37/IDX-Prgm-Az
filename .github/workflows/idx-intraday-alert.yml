name: IDX intraday Telegram alert

on:
  schedule:
    # GitHub memakai UTC. Ini berarti 09:00–15:30 WIB, Senin–Jumat.
    - cron: "*/30 2-8 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-alerts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Cek sinyal dan kirim Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python alert_engine.py
      - name: Simpan status anti-spam
        run: |
          git config user.name "idx-alert-bot"
          git config user.email "idx-alert-bot@users.noreply.github.com"
          git add alert_state.json
          git diff --cached --quiet || git commit -m "chore: update alert state"
          git push
